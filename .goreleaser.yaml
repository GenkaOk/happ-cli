# GoReleaser builds multi-platform binaries and publishes a GitHub Release.
# Run locally with `goreleaser release --clean` (needs GITHUB_TOKEN) or let the
# release workflow run it on a tag push. Building here honors the go.mod
# `replace` directive (happ-cli is the main module), unlike `go install @ver`.
version: 2

project_name: happ-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: happ
    binary: happ
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: aimuzov
    name: happ-cli

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
